name: Sync Figma Tokens

on:
  schedule:
    - cron: '*/30 * * * *'   # 30분마다
  workflow_dispatch:           # 수동 실행 가능

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync tokens from Figma
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: node docs-site/scripts/sync-tokens.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet docs-site/src/styles/tokens.css || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated tokens
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs-site/src/styles/tokens.css
          git commit -m "chore: sync Figma design tokens [skip ci]"
          git push
